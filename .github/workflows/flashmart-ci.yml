name: FlashMart Production Pipeline

# 1. When should this robot wake up? Every time we push to the main branch!
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # A fresh, empty Linux server

    # 2. Spin up our disposable backend infrastructure!
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: flashmart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:latest
        ports:
          - 6379:6379

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    # 3. The actual steps the robot will take
    steps:
      - name: 📥 Checkout Source Code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Makes future builds much faster!

      - name: 🔧 Grant execute permission to Maven
        run: chmod +x ./mvnw

      - name: 🚀 Run Massive Stress Test & Compile
        # We trick Spring Boot into connecting to our temporary GitHub databases instead of the cloud!
        env:
          YOUR_LOCAL_MYSQL_PASSWORD: root
          YOUR_ONLINE_REDIS_URL: redis://localhost:6379
          YOUR_RABBITMQ_URL: amqp://guest:guest@localhost:5672
        run: ./mvnw clean install